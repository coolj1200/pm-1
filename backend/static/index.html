<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Management API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #209dd7 0%, #753991 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #032147;
            margin-bottom: 20px;
            font-size: 32px;
        }
        
        p {
            color: #888888;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .status-section {
            background: #f5f5f5;
            border-left: 4px solid #ecad0a;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 4px;
        }
        
        .status-section h2 {
            color: #032147;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #209dd7;
        }
        
        .status.loading .status-dot {
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        .status.success .status-dot {
            background: #10b981;
        }
        
        .status.error .status-dot {
            background: #ef4444;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .response {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            overflow-x: auto;
            color: #374151;
            margin-top: 10px;
        }
        
        button {
            background: #753991;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background: #5a2971;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(117, 57, 145, 0.2);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Project Management API</h1>
        <p>Backend server is running! Test the API endpoints below to verify connectivity.</p>
        
        <div class="status-section">
            <h2>API Health Check</h2>
            <div class="status loading" id="health-status">
                <div class="status-dot"></div>
                <span>Testing connection...</span>
            </div>
            <div class="response" id="health-response" style="display: none;"></div>
        </div>
        
        <div class="button-group">
            <button onclick="testHealth()">Test /api/health</button>
            <button onclick="testHealth()" style="background: #209dd7;">Retry</button>
        </div>
    </div>
    
    <script>
        async function testHealth() {
            const statusEl = document.getElementById('health-status');
            const responseEl = document.getElementById('health-response');
            
            statusEl.className = 'status loading';
            statusEl.innerHTML = '<div class="status-dot"></div><span>Testing connection...</span>';
            responseEl.style.display = 'none';
            
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                
                statusEl.className = 'status success';
                statusEl.innerHTML = `<div class="status-dot"></div><span>✓ Connected</span>`;
                responseEl.textContent = JSON.stringify(data, null, 2);
                responseEl.style.display = 'block';
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.innerHTML = `<div class="status-dot"></div><span>✗ Error: ${error.message}</span>`;
                responseEl.textContent = error.message;
                responseEl.style.display = 'block';
            }
        }
        
        // Test on page load
        window.addEventListener('load', testHealth);
    </script>
</body>
</html>
